name: "functional_annotation"
description: Performs functional annotation of protein sequences, specifically using InterProScan with automated database download/extraction.
keywords:
  - annotation
  - interproscan
  - proteomics
  - proteins
components:
  - aria2/main
  - untar/main
  - interproscan/main

input:
  - ch_fasta:
      type: list
      description: |
        List of [ meta, fasta ]
        meta: Groovy Map containing sample information (e.g. [ id:'test' ])
        fasta: Protein FASTA file to be annotated
  - skip_interproscan:
      type: boolean
      description: Set to true to skip the InterProScan annotation process.
  - interproscan_db_url:
      type: string
      description: Remote URL to download the InterProScan database if not provided locally.
  - interproscan_db:
      type: string
      description: Path to a local InterProScan database directory.

output:
  - interproscan_tsv:
      type: file
      description: TSV file containing the functional annotation results from InterProScan.
      pattern: "*.{tsv}"
  - versions:
      type: file
      description: File containing software versions.
      pattern: "versions.yml"

authors:
  - "@Muskan" 
  - "@Muskan"
