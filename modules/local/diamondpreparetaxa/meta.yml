---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "diamondpreparetaxa"
description: Downloads and extracts NCBI taxonomy database files (nodes.dmp and names.dmp) required for DIAMOND taxonomic classification
keywords:
  - taxonomy
  - ncbi
  - diamond
  - database
  - classification
tools:
  - "wget":
      description: Network downloader that retrieves files from the web
      homepage: "https://www.gnu.org/software/wget/"
      documentation: "https://www.gnu.org/software/wget/manual/"
      tool_dev_url: "https://git.savannah.gnu.org/cgit/wget.git"
      licence: ["GPL-3.0-or-later"]
  - "diamond":
      description: Accelerated BLAST-compatible local sequence aligner
      homepage: "https://github.com/bbuchfink/diamond"
      documentation: "https://github.com/bbuchfink/diamond/wiki"
      tool_dev_url: "https://github.com/bbuchfink/diamond"
      doi: "10.1038/s41592-021-01101-x"
      licence: ["GPL-3.0-or-later"]

input:
  - taxondmp_zip:
      type: string
      description: URL to NCBI taxonomy dump archive (taxdump.tar.gz)
      pattern: ".*taxdump.tar.gz"

output:
  - taxonnodes:
      - "taxa/nodes.dmp":
          type: file
          description: NCBI taxonomy nodes file containing taxonomic hierarchy
          pattern: "nodes.dmp"
          
  - taxonnames:
      - "taxa/names.dmp":
          type: file
          description: NCBI taxonomy names file containing taxon names
          pattern: "names.dmp"
          
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"

authors:
  - "@tracelail"
maintainers:
  - "@tracelail"