---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "ncbirefseqdownload"
description: Downloads NCBI RefSeq protein sequences for a specified release category and aggregates them into a single compressed FASTA file
keywords:
  - download
  - refseq
  - ncbi
  - protein
  - database
tools:
  - "rsync":
      description: Fast and versatile file copying tool for remote and local files
      homepage: "https://rsync.samba.org/"
      documentation: "https://download.samba.org/pub/rsync/rsync.1"
      tool_dev_url: "https://github.com/WayneD/rsync"
      licence: ["GPL-3.0-or-later"]

input:
  - refseq_release:
      type: string
      description: NCBI RefSeq release category (e.g., 'complete', 'other', 'viral', 'bacteria')
      pattern: ".*"

output:
  - refseq_fasta:
      - "ncbi_refseq/refseq_fasta.fa.gz":
          type: file
          description: Aggregated and compressed protein FASTA file from RefSeq release
          pattern: "*.fa.gz"
          
  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"

authors:
  - "@tracelail"
maintainers:
  - "@tracelail"